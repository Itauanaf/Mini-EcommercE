<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Éden | Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-slate-900 overflow-x-hidden">

    <div class="w-full bg-black py-2.5 px-4 overflow-hidden fixed top-0 z-[100]">
        <div id="barra-anuncios" class="flex justify-center items-center">
            <p id="texto-anuncio" class="text-[9px] font-bold text-white uppercase tracking-[0.4em] text-center">
                FRETE FIXO PARA PETROLINA & JUAZEIRO
            </p>
        </div>
    </div>

    <header id="main-header" class="fixed top-[34px] w-full bg-white/80 backdrop-blur-md z-50 px-6 py-5 border-b border-slate-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="brand-logo" onclick="showView('shop-view')">ÉDEN</span>
            
            <button onclick="showView('cart-view')" class="relative p-1">
                <i class="bi bi-bag-heart text-2xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-black text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold hidden">0</span>
            </button>
        </div>
    </header>

    <main id="shop-view" class="view-section w-full overflow-x-hidden">
        
        <section class="relative w-full h-[80vh] md:h-[90vh] overflow-hidden bg-slate-900">
            <picture>
                <source media="(max-width: 768px)" srcset="assets/banner-mobile.png">
                
                <img src="assets/banner-desktop.png" 
                     class="w-full h-full object-cover object-center animate-subtle-zoom" 
                     alt="Nova Coleção Éden">
            </picture>
            
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>

            <div class="absolute inset-0 flex flex-col justify-end p-8 md:p-20 text-white max-w-7xl mx-auto w-full">
                <span class="text-[10px] md:text-xs font-bold tracking-[0.6em] uppercase mb-4 opacity-90">Drop '1 Disponível</span>
                <h2 class="text-5xl md:text-8xl font-bold italic tracking-tighter leading-[0.9] mb-8">
                    ÁGUAS VIVAS<br>OVERSIZED
                </h2>
                <div class="flex gap-4">
                    <button onclick="document.getElementById('grid-produtos').scrollIntoView({behavior: 'smooth'})" 
                            class="bg-white text-black px-10 py-4 rounded-full text-[11px] font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all active:scale-95">
                        Explorar Peças
                    </button>
                </div>
            </div>
        </section>

        <div class="max-w-7xl mx-auto px-6 mt-16 mb-10 md:mb-16">
            <h1 class="text-3xl md:text-5xl font-light leading-tight">Coleção de<br><span class="font-semibold italic">Blusas '26</span></h1>
        </div>

        <div id="grid-produtos" class="max-w-7xl mx-auto px-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-4 gap-y-10">
            <p class="col-span-full text-center py-10 text-slate-400 italic">Carregando catálogo...</p>
        </div>
    </main>

    <footer class="mt-24 pb-20 bg-white">
        <div class="max-w-7xl mx-auto px-6">
            <div class="w-full h-[1px] bg-slate-100 mb-12"></div>
            <div class="flex flex-col items-center justify-center text-center">
                <h2 class="text-[11px] font-bold tracking-[0.8em] text-slate-900 uppercase mb-3">ÉDEN</h2>
                <p class="text-[9px] text-slate-400 uppercase tracking-[0.4em] font-medium">© 2026</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="index.js"></script>
</body>
</html>
