<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Éden | Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-slate-900 overflow-x-hidden">

    <div class="w-full bg-black py-2.5 px-4 overflow-hidden fixed top-0 z-[100]">
        <div id="barra-anuncios" class="flex justify-center items-center">
            <p id="texto-anuncio" class="text-[9px] font-bold text-white uppercase tracking-[0.4em] text-center">
                FRETE FIXO PARA PETROLINA & JUAZEIRO
            </p>
        </div>
    </div>

    <header id="main-header" class="fixed top-[34px] w-full bg-white/80 backdrop-blur-md z-50 px-6 py-5 border-b border-slate-50 transition-all duration-300">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="brand-logo" onclick="showView('shop-view')">ÉDEN</span>
            
            <button onclick="showView('cart-view')" class="relative p-1">
                <i class="bi bi-bag-heart text-2xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-black text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold hidden">0</span>
            </button>
        </div>
    </header>

    <main id="shop-view" class="view-section w-full overflow-x-hidden pt-[100px]">
        <section class="relative w-full h-[80vh] md:h-[90vh] overflow-hidden bg-slate-900">
            <picture>
                <source media="(max-width: 768px)" srcset="assets/banner-mobile.png">
                <img src="assets/banner-desktop.png" class="w-full h-full object-cover object-center animate-subtle-zoom" alt="Nova Coleção Éden">
            </picture>
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
            <div class="absolute inset-0 flex flex-col justify-end p-8 md:p-20 text-white max-w-7xl mx-auto w-full">
                <span class="text-[10px] md:text-xs font-bold tracking-[0.6em] uppercase mb-4 opacity-90">Drop '1 Disponível</span>
                <h2 class="text-5xl md:text-8xl font-bold italic tracking-tighter leading-[0.9] mb-8">ÁGUAS VIVAS<br>OVERSIZED</h2>
                <div class="flex gap-4">
                    <button onclick="document.getElementById('grid-produtos').scrollIntoView({behavior: 'smooth'})" 
                            class="bg-white text-black px-10 py-4 rounded-full text-[11px] font-bold uppercase tracking-widest hover:bg-black hover:text-white transition-all active:scale-95">
                        Explorar Peças
                    </button>
                </div>
            </div>
        </section>

        <div class="max-w-7xl mx-auto px-6 mt-16 mb-10 md:mb-16">
            <h1 class="text-3xl md:text-5xl font-light leading-tight">Coleção de<br><span class="font-semibold italic">Blusas '26</span></h1>
        </div>

        <div id="grid-produtos" class="max-w-7xl mx-auto px-6 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-x-4 gap-y-10">
            <p class="col-span-full text-center py-10 text-slate-400 italic">Carregando catálogo...</p>
        </div>
    </main>

    <aside id="cart-view" class="view-section hidden fixed inset-y-0 right-0 w-full md:w-[450px] bg-white z-[200] shadow-2xl flex flex-col p-8">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-2xl font-bold italic tracking-tighter">SUA SACOLA</h2>
            <button onclick="showView('shop-view')" class="text-slate-400 hover:text-black">
    <i class="bi bi-x-lg text-xl"></i>
</button>
        </div>

        <div id="cart-items-list" class="flex-1 overflow-y-auto no-scrollbar">
            </div>

        <div class="border-t border-slate-100 pt-8 mt-6">
            <div class="flex justify-between mb-6">
                <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">Total</span>
                <span id="cart-total-value" class="text-xl font-bold">R$ 0,00</span>
            </div>
            <button onclick="checkout()" class="w-full py-5 bg-black text-white text-[11px] font-bold uppercase tracking-[0.2em] rounded-2xl hover:bg-slate-800 transition-all active:scale-95">
                Fechar Pedido
            </button>
        </div>
    </aside>

    <section id="checkout-view" class="view-section hidden w-full max-w-2xl mx-auto px-6 pt-[140px] pb-20">
        <h2 class="text-3xl font-bold italic tracking-tighter mb-10">FINALIZAR PEDIDO</h2>
        
        <form id="order-form" onsubmit="finalizarCompra(event)" class="space-y-8">
            <div class="space-y-4">
                <h3 class="text-[10px] font-bold uppercase tracking-[0.3em] text-slate-400 border-b pb-2">Informações de Entrega</h3>
                <input type="text" id="nome" placeholder="Seu nome completo" class="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-1 ring-black transition-all" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="cep" placeholder="CEP" onblur="buscaCEP(this.value)" class="w-full p-4 bg-slate-50 rounded-xl outline-none" required>
                    <input type="text" id="numero" placeholder="Nº" class="w-full p-4 bg-slate-50 rounded-xl outline-none" required>
                </div>
                <input type="text" id="rua" placeholder="Endereço Completo" class="w-full p-4 bg-slate-50 rounded-xl outline-none" required>
            </div>

            <div id="cupom-container" class="flex gap-2">
                <input type="text" id="input-cupom" placeholder="CUPOM DE DESCONTO" class="flex-1 p-4 bg-slate-50 rounded-xl outline-none uppercase text-xs tracking-widest">
                <button type="button" onclick="aplicarCupom()" class="px-6 bg-slate-100 text-[10px] font-bold uppercase rounded-xl">Aplicar</button>
            </div>
            <div id="cupom-feedback" class="hidden flex justify-between items-center p-4 bg-green-50 text-green-700 rounded-xl">
                <span id="texto-cupom-aplicado" class="text-[10px] font-bold tracking-widest"></span>
                <button type="button" onclick="removerCupom()" class="text-xs underline">Remover</button>
            </div>

            <div id="secao-frete" class="hidden p-4 bg-slate-50 rounded-xl flex justify-between items-center">
                <div>
                    <p id="label-frete" class="text-[10px] font-bold uppercase tracking-widest"></p>
                    <p class="text-[9px] text-slate-400">Entrega via motoboy ou correios</p>
                </div>
                <span id="valor-frete" class="font-bold text-sm"></span>
            </div>

            <div class="space-y-4">
                <h3 class="text-[10px] font-bold uppercase tracking-[0.3em] text-slate-400 border-b pb-2">Forma de Pagamento</h3>
                <div class="grid grid-cols-2 gap-4">
                    <label class="cursor-pointer">
                        <input type="radio" name="pagamento" value="PIX" class="hidden" required>
                        <div class="payment-card p-4 bg-slate-50 rounded-xl text-center text-[10px] font-bold tracking-widest uppercase">PIX (10% OFF)</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="pagamento" value="Cartão" class="hidden" required>
                        <div class="payment-card p-4 bg-slate-50 rounded-xl text-center text-[10px] font-bold tracking-widest uppercase">Cartão</div>
                    </label>
                </div>
            </div>

            <button type="submit" id="btn-finalizar" class="w-full py-5 bg-black text-white text-[11px] font-bold uppercase tracking-[0.2em] rounded-2xl active:scale-95 transition-all">
                Finalizar no WhatsApp
            </button>
        </form>
    </section>

    <footer class="mt-24 pb-20 bg-white">
        <div class="max-w-7xl mx-auto px-6 text-center">
            <div class="w-full h-[1px] bg-slate-100 mb-12"></div>
            <h2 class="text-[11px] font-bold tracking-[0.8em] text-slate-900 uppercase mb-3">ÉDEN</h2>
            <p class="text-[9px] text-slate-400 uppercase tracking-[0.4em] font-medium">© 2026</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="index.js"></script>
</body>
</html>
